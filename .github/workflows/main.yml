name: Pipeline CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar código
      uses: actions/checkout@v4

    - name: Instalar Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Rodar app
      run: node app.js

    - name: Rodar testes
      run: node test.js
